<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinguaBridge — Traductor ES ↔ EN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --card:      #16161f;
      --border:    #2a2a3a;
      --gold:      #c9a84c;
      --gold-dim:  #7a5f28;
      --cream:     #f0e8d0;
      --muted:     #555570;
      --accent:    #4c7ac9;
      --danger:    #c94c4c;
      --success:   #4cc97a;
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: .35;
    }

    /* ── Ambient glow blobs ── */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(110px);
      pointer-events: none; z-index: 0; opacity: .18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob1 { width: 500px; height: 500px; top: -150px; left: -150px; background: radial-gradient(circle, #c9a84c, transparent 70%); }
    .blob2 { width: 400px; height: 400px; bottom: -100px; right: -100px; background: radial-gradient(circle, #4c7ac9, transparent 70%); animation-delay: -6s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.1); } }

    /* ── Layout ── */
    .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ── */
    header {
      padding: 52px 0 36px;
      display: flex; align-items: flex-end; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      animation: fadeDown .7s ease both;
    }
    .logo { display: flex; flex-direction: column; gap: 2px; }
    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      letter-spacing: .12em;
      background: linear-gradient(135deg, var(--gold), var(--cream) 60%, var(--gold-dim));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .logo-sub {
      font-size: .62rem; letter-spacing: .3em; color: var(--gold-dim);
      text-transform: uppercase;
    }
    .badge {
      font-size: .62rem; letter-spacing: .18em; color: var(--muted);
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 999px;
      text-transform: uppercase;
    }

    /* ── Lang bar ── */
    .lang-bar {
      display: flex; align-items: center; gap: 12px;
      margin: 40px 0 20px;
      animation: fadeUp .6s .15s ease both;
    }
    .lang-pill {
      flex: 1; text-align: center;
      font-size: .75rem; letter-spacing: .22em; text-transform: uppercase;
      padding: 14px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--cream);
      cursor: pointer; user-select: none;
      transition: border-color .2s, color .2s;
      position: relative; overflow: hidden;
    }
    .lang-pill.active {
      border-color: var(--gold);
      color: var(--gold);
    }
    .lang-pill::after {
      content: ''; position: absolute; inset: 0;
      background: var(--gold); opacity: 0;
      transition: opacity .2s;
    }
    .lang-pill:hover::after { opacity: .04; }

    .swap-btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      color: var(--gold); font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), border-color .2s;
      flex-shrink: 0;
    }
    .swap-btn:hover { transform: rotate(180deg); border-color: var(--gold); }

    /* ── Panels ── */
    .panels {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
      animation: fadeUp .6s .25s ease both;
    }
    @media(max-width: 680px) { .panels { grid-template-columns: 1fr; } }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      min-height: 280px; overflow: hidden;
      transition: border-color .3s;
    }
    .panel:focus-within { border-color: var(--gold-dim); }

    .panel-head {
      padding: 14px 18px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .panel-lang {
      font-size: .62rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted);
    }
    .panel-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 4px 6px; border-radius: 6px;
      font-size: .85rem; transition: color .2s, background .2s;
      display: flex; align-items: center; gap: 4px;
    }
    .icon-btn:hover { color: var(--cream); background: var(--border); }
    .icon-btn.active { color: var(--gold); }
    .icon-btn svg { width: 15px; height: 15px; fill: currentColor; }

    textarea, .result-box {
      flex: 1; padding: 20px 18px;
      background: transparent; border: none; outline: none; resize: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem; font-weight: 300; line-height: 1.65;
      color: var(--cream);
      width: 100%;
    }
    textarea::placeholder { color: var(--muted); }

    .result-box {
      color: var(--cream);
      white-space: pre-wrap; word-break: break-word;
      cursor: default; position: relative;
    }
    .result-box.empty { color: var(--muted); font-style: italic; }
    .result-box.loading::after {
      content: '';
      position: absolute; bottom: 20px; left: 18px;
      width: 30px; height: 2px;
      background: var(--gold);
      animation: scan 1.2s ease-in-out infinite;
    }
    @keyframes scan {
      0%   { width: 30px; opacity: 1; }
      50%  { width: 80px; opacity: .7; }
      100% { width: 30px; opacity: 1; }
    }

    .panel-foot {
      padding: 10px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
    }
    .char-count { font-size: .62rem; letter-spacing: .1em; color: var(--muted); }
    .char-count.warn { color: var(--gold); }
    .char-count.over { color: var(--danger); }

    /* ── Translate button ── */
    .translate-wrap {
      display: flex; justify-content: center; margin: 24px 0;
      animation: fadeUp .6s .35s ease both;
    }
    .translate-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: .25em;
      padding: 15px 52px; border-radius: 999px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: color .3s, transform .2s;
    }
    .translate-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--gold); transform: scaleX(0) ; transform-origin: left;
      transition: transform .35s cubic-bezier(.23,1,.32,1);
    }
    .translate-btn span { position: relative; z-index: 1; }
    .translate-btn:hover::before { transform: scaleX(1); }
    .translate-btn:hover { color: var(--bg); }
    .translate-btn:active { transform: scale(.97); }
    .translate-btn:disabled { opacity: .4; cursor: not-allowed; }
    .translate-btn:disabled::before { transform: scaleX(0); }

    /* ── Shortcuts hint ── */
    .hint {
      text-align: center; font-size: .62rem; letter-spacing: .15em;
      color: var(--muted); text-transform: uppercase;
      margin-top: -8px; margin-bottom: 10px;
      animation: fadeUp .6s .4s ease both;
    }
    kbd {
      background: var(--border); border-radius: 4px;
      padding: 2px 6px; font-size: .6rem; color: var(--cream);
    }

    /* ── History ── */
    .history-section {
      margin-top: 52px;
      animation: fadeUp .6s .45s ease both;
    }
    .section-title {
      font-size: .62rem; letter-spacing: .35em; text-transform: uppercase;
      color: var(--gold-dim); margin-bottom: 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 12px; align-items: center;
      cursor: pointer; transition: border-color .2s, transform .15s;
      animation: slideIn .3s ease both;
    }
    .history-item:hover { border-color: var(--gold-dim); transform: translateY(-1px); }
    .history-item .ht { font-size: .75rem; color: var(--cream); line-height: 1.4; }
    .history-item .ht.src { color: var(--muted); }
    .history-arrow { color: var(--gold-dim); font-size: .8rem; }
    .history-dir {
      font-size: .52rem; letter-spacing: .2em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 4px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; right: 32px; z-index: 999;
      background: var(--card); border: 1px solid var(--gold-dim);
      color: var(--gold); padding: 12px 22px;
      border-radius: 999px; font-size: .7rem; letter-spacing: .15em;
      text-transform: uppercase;
      opacity: 0; transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Animations ── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:none; } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(14px);  } to { opacity:1; transform:none; } }
    @keyframes slideIn  { from { opacity:0; transform:translateY(6px); }  to { opacity:1; transform:none; } }

    /* ── Status dot ── */
    .status-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--success);
      margin-right: 6px; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

    /* ── Empty history ── */
    .empty-hist {
      color: var(--muted); font-size: .75rem; text-align: center;
      padding: 32px; border: 1px dashed var(--border); border-radius: var(--radius);
    }

    /* ── Detected language badge ── */
    .detected-lang {
      font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--accent); display: none;
    }
    .detected-lang.show { display: inline; }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-name">LinguaBridge</div>
      <div class="logo-sub">Traductor Español ↔ English</div>
    </div>
    <div class="badge"><span class="status-dot"></span>Google Translate API</div>
  </header>

  <!-- Language bar -->
  <div class="lang-bar">
    <div class="lang-pill active" id="srcPill" onclick="setDir('es','en')">🇦🇷 Español</div>
    <button class="swap-btn" onclick="swapLangs()" title="Intercambiar idiomas">⇄</button>
    <div class="lang-pill" id="tgtPill" onclick="setDir('en','es')">🇺🇸 English</div>
  </div>

  <!-- Panels -->
  <div class="panels">

    <!-- Source -->
    <div class="panel">
      <div class="panel-head">
        <span class="panel-lang" id="srcLabel">Español — fuente</span>
        <div class="panel-actions">
          <span class="detected-lang" id="detectedLabel"></span>
          <button class="icon-btn" onclick="clearAll()" title="Limpiar">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
          <button class="icon-btn" id="micBtn" onclick="toggleMic()" title="Dictar">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </button>
        </div>
      </div>
      <textarea id="srcText" placeholder="Escribe o pega el texto aquí…" maxlength="5000" onkeydown="handleKey(event)" oninput="updateCount()"></textarea>
      <div class="panel-foot">
        <span class="char-count" id="charCount">0 / 5000</span>
        <button class="icon-btn" onclick="copyText('srcText')" title="Copiar">
          <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
      </div>
    </div>

    <!-- Target -->
    <div class="panel">
      <div class="panel-head">
        <span class="panel-lang" id="tgtLabel">English — translation</span>
        <div class="panel-actions">
          <button class="icon-btn" id="speakBtn" onclick="speakResult()" title="Escuchar">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          </button>
          <button class="icon-btn" onclick="copyResult()" title="Copiar traducción">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          </button>
        </div>
      </div>
      <div class="result-box empty" id="resultBox">La traducción aparecerá aquí…</div>
      <div class="panel-foot">
        <span class="char-count" id="resultCount">—</span>
        <span id="confidenceLabel" style="font-size:.6rem;color:var(--muted);letter-spacing:.1em;"></span>
      </div>
    </div>

  </div><!-- /panels -->

  <!-- Translate button -->
  <div class="translate-wrap">
    <button class="translate-btn" id="translateBtn" onclick="translate()">
      <span>Traducir</span>
    </button>
  </div>
  <p class="hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> para traducir · <kbd>Alt</kbd> + <kbd>S</kbd> para intercambiar</p>

  <!-- History -->
  <div class="history-section">
    <div class="section-title">Historial de traducciones</div>
    <div class="history-list" id="historyList">
      <div class="empty-hist">Aún no hay traducciones — ¡escribe algo arriba!</div>
    </div>
  </div>

</div><!-- /wrapper -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  /* ─── State ─── */
  let srcLang = 'es', tgtLang = 'en';
  let lastResult = '';
  let history = JSON.parse(localStorage.getItem('lb_history') || '[]');
  let recognition = null;
  let micActive = false;

  /* ─── Init ─── */
  renderHistory();
  updateLangUI();

  /* ─── Language control ─── */
  function setDir(s, t) {
    srcLang = s; tgtLang = t;
    updateLangUI();
  }

  function swapLangs() {
    [srcLang, tgtLang] = [tgtLang, srcLang];
    const srcText = document.getElementById('srcText');
    const resultBox = document.getElementById('resultBox');
    if (lastResult && !resultBox.classList.contains('empty')) {
      srcText.value = lastResult;
      updateCount();
    }
    clearResult();
    updateLangUI();
  }

  function updateLangUI() {
    const srcPill = document.getElementById('srcPill');
    const tgtPill = document.getElementById('tgtPill');
    const srcLabel = document.getElementById('srcLabel');
    const tgtLabel = document.getElementById('tgtLabel');

    const names = { es: '🇦🇷 Español', en: '🇺🇸 English' };
    const labels = { es: 'Español — fuente', en: 'English — source' };
    const targetLabels = { es: 'Español — traducción', en: 'English — translation' };

    srcPill.textContent = names[srcLang];
    tgtPill.textContent = names[tgtLang];
    srcLabel.textContent = labels[srcLang];
    tgtLabel.textContent = targetLabels[tgtLang];

    srcPill.classList.toggle('active', true);
    tgtPill.classList.toggle('active', false);
  }

  /* ─── Translation ─── */
  async function translate() {
    const text = document.getElementById('srcText').value.trim();
    if (!text) { showToast('⚠ Escribe algo primero'); return; }

    const btn = document.getElementById('translateBtn');
    const box = document.getElementById('resultBox');
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Traduciendo…';
    box.textContent = '';
    box.classList.remove('empty');
    box.classList.add('loading');
    document.getElementById('confidenceLabel').textContent = '';

    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${srcLang}&tl=${tgtLang}&dt=t&dt=bd&dt=ld&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Network error');
      const data = await res.json();

      // Build translation from chunks
      let translated = '';
      if (data[0]) {
        for (const chunk of data[0]) {
          if (chunk[0]) translated += chunk[0];
        }
      }

      // Detected language
      const detected = data[2] || srcLang;
      const detLabel = document.getElementById('detectedLabel');
      if (detected !== srcLang) {
        detLabel.textContent = `Detectado: ${detected.toUpperCase()}`;
        detLabel.classList.add('show');
      } else {
        detLabel.classList.remove('show');
      }

      box.classList.remove('loading');
      lastResult = translated;
      typeWriter(box, translated);
      document.getElementById('resultCount').textContent = `${translated.length} chars`;

      // Save to history
      addToHistory(text, translated, srcLang, tgtLang);

    } catch(e) {
      box.classList.remove('loading');
      box.textContent = '❌ Error al traducir. Verifica tu conexión.';
      box.classList.add('empty');
      showToast('Error de red — reintenta');
    } finally {
      btn.disabled = false;
      btn.querySelector('span').textContent = 'Traducir';
    }
  }

  /* ─── Typewriter effect ─── */
  function typeWriter(el, text) {
    el.textContent = '';
    let i = 0;
    const speed = Math.min(18, 3000 / text.length);
    const iv = setInterval(() => {
      el.textContent += text[i];
      i++;
      if (i >= text.length) clearInterval(iv);
    }, speed);
  }

  /* ─── History ─── */
  function addToHistory(src, tgt, sl, tl) {
    history.unshift({ src, tgt, sl, tl, ts: Date.now() });
    if (history.length > 20) history.pop();
    localStorage.setItem('lb_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = '<div class="empty-hist">Aún no hay traducciones — ¡escribe algo arriba!</div>';
      return;
    }
    list.innerHTML = history.slice(0, 8).map((h, i) => `
      <div class="history-item" onclick="loadHistory(${i})" style="animation-delay:${i * 0.04}s">
        <div>
          <div class="history-dir">${h.sl.toUpperCase()}</div>
          <div class="ht src">${truncate(h.src, 60)}</div>
        </div>
        <div class="history-arrow">→</div>
        <div>
          <div class="history-dir">${h.tl.toUpperCase()}</div>
          <div class="ht">${truncate(h.tgt, 60)}</div>
        </div>
      </div>
    `).join('');
  }

  function loadHistory(i) {
    const h = history[i];
    srcLang = h.sl; tgtLang = h.tl;
    document.getElementById('srcText').value = h.src;
    document.getElementById('resultBox').textContent = h.tgt;
    document.getElementById('resultBox').classList.remove('empty', 'loading');
    document.getElementById('resultCount').textContent = `${h.tgt.length} chars`;
    lastResult = h.tgt;
    updateLangUI();
    updateCount();
    showToast('↩ Traducción cargada');
  }

  function truncate(str, n) {
    return str.length > n ? str.slice(0, n) + '…' : str;
  }

  /* ─── Utilities ─── */
  function clearAll() {
    document.getElementById('srcText').value = '';
    clearResult();
    updateCount();
  }

  function clearResult() {
    const box = document.getElementById('resultBox');
    box.textContent = 'La traducción aparecerá aquí…';
    box.classList.add('empty');
    box.classList.remove('loading');
    document.getElementById('resultCount').textContent = '—';
    document.getElementById('confidenceLabel').textContent = '';
    lastResult = '';
    document.getElementById('detectedLabel').classList.remove('show');
  }

  function updateCount() {
    const n = document.getElementById('srcText').value.length;
    const el = document.getElementById('charCount');
    el.textContent = `${n} / 5000`;
    el.className = 'char-count' + (n > 4500 ? ' over' : n > 3500 ? ' warn' : '');
  }

  function copyText(id) {
    const text = document.getElementById(id).value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => showToast('📋 Texto copiado'));
  }

  function copyResult() {
    if (!lastResult) return;
    navigator.clipboard.writeText(lastResult).then(() => showToast('📋 Traducción copiada'));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  /* ─── Keyboard shortcuts ─── */
  function handleKey(e) {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); translate(); }
  }
  document.addEventListener('keydown', e => {
    if (e.altKey && e.key.toLowerCase() === 's') { e.preventDefault(); swapLangs(); }
  });

  /* ─── Speech synthesis ─── */
  function speakResult() {
    if (!lastResult) { showToast('Primero traduce algo'); return; }
    const utter = new SpeechSynthesisUtterance(lastResult);
    utter.lang = tgtLang === 'en' ? 'en-US' : 'es-ES';
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
    showToast('🔊 Reproduciendo…');
  }

  /* ─── Speech recognition (mic) ─── */
  function toggleMic() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      showToast('⚠ Tu navegador no soporta dictado');
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const btn = document.getElementById('micBtn');

    if (micActive) {
      recognition && recognition.stop();
      micActive = false;
      btn.classList.remove('active');
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = srcLang === 'es' ? 'es-AR' : 'en-US';
    recognition.continuous = true;
    recognition.interimResults = true;

    const base = document.getElementById('srcText').value;
    recognition.onresult = e => {
      let interim = '';
      let final = base;
      for (const r of e.results) {
        if (r.isFinal) final += r[0].transcript;
        else interim += r[0].transcript;
      }
      document.getElementById('srcText').value = final + interim;
      updateCount();
    };
    recognition.onend = () => {
      micActive = false; btn.classList.remove('active');
    };
    recognition.start();
    micActive = true;
    btn.classList.add('active');
    showToast('🎤 Dictando… habla ahora');
  }
</script>
</body>
</html>
